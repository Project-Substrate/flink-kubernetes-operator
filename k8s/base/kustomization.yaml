apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: flink-operator

commonLabels:
  app.kubernetes.io/managed-by: argocd
  app.kubernetes.io/part-of: magnon-platform
  magnon.io/project: substrate

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
  - networkpolicy.yaml
  - ciliumnetworkpolicy.yaml
  - default-deny-cilium.yaml
  - pdb.yaml
  - resourcequota.yaml

images:
  - name: ghcr.io/project-substrate/flink-kubernetes-operator
    newTag: latest
