apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-kubernetes-operator
  namespace: flink-operator
  labels:
    app: flink-kubernetes-operator
    app.kubernetes.io/name: flink-kubernetes-operator
    app.kubernetes.io/part-of: magnon-platform
    magnon.io/project: substrate
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink-kubernetes-operator
  template:
    metadata:
      labels:
        app: flink-kubernetes-operator
        app.kubernetes.io/name: flink-kubernetes-operator
        app.kubernetes.io/part-of: magnon-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: flink-kubernetes-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 9999
        fsGroup: 9999
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: flink-kubernetes-operator
          image: ghcr.io/project-substrate/flink-kubernetes-operator:latest
          imagePullPolicy: Always
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8085
              protocol: TCP
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "ifers-kafka-bootstrap.kafka.svc.cluster.local:9092"
          readinessProbe:
            httpGet:
              path: /
              port: 8085
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: flink-operator-config
              mountPath: /opt/flink/conf
      volumes:
        - name: tmp
          emptyDir: {}
        - name: flink-operator-config
          configMap:
            name: flink-operator-config
      terminationGracePeriodSeconds: 30
      nodeSelector:
        kubernetes.io/os: linux
