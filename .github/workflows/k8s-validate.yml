name: k8s validate
on:
  pull_request:
    paths: ['k8s/**', '**/k8s/**']

jobs:
  validate:
    runs-on: [self-hosted, magnon-enterprise-runners]
    steps:
    - uses: actions/checkout@v4
    - name: kustomize build all overlays
      run: |
        for repo in */; do
          if [ -d "$repo/k8s/overlays" ]; then
            for overlay in "$repo/k8s/overlays"/*/; do
              kustomize build "$overlay" > /dev/null
            done
          fi
        done
    - name: kustomize build base
      run: kustomize build k8s/base > /dev/null
